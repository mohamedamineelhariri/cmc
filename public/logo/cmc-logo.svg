  <rect x="155" y="10" width="5" height="100" fill="#A0A0A0"/>
  
  <!-- Inner architectural shapes - teal/blue -->
  <path d="M60 45 L60 140 L80 140 L80 75 L100 75 L100 140 L120 140 L120 55 L140 55 L140 140 L155 140 L155 145 L40 145 L40 140 L55 140 L55 45 Z" fill="#4BA8B8"/>
  
